name: Feature request
description: Suggest a new tool, a new TheHive endpoint to cover, or an improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What is the problem
      description: What are you trying to do with an AI client against TheHive that thehive-mcp does not let you do today?
      placeholder: |
        I want my agent to do X during incident response, but there is no tool for it.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed tool or change
      description: If you have a TheHive API endpoint or a tool shape in mind, describe it. Note whether it is read, write, or destructive.
      placeholder: |
        A `thehive_...` tool that calls the `/api/v1/...` endpoint and returns ...
    validations:
      required: false
  - type: dropdown
    id: safety
    attributes:
      label: Safety class
      description: Destructive or irreversible tools must be gated behind THEHIVE_ALLOW_DESTRUCTIVE_TOOLS.
      options:
        - Read-only
        - Write (creates or updates data)
        - Destructive or irreversible (delete, merge, promote)
        - Not sure
    validations:
      required: false
  - type: checkboxes
    id: scrub
    attributes:
      label: Pre-flight
      options:
        - label: I have removed any API keys, real hostnames, and personal paths from this request.
          required: true
